<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Web</title>

<!-- Bootstrap para mejora de diseño-->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- archivo de estilos-->
<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
<!-- contenedor de calculadora-->
<div class="calculadora card p-4 shadow-lg">
<!--Titulo calculadora -->
<h3 class="text-center mb-3">Calculadora</h3>
<!--Pantalla de numeros y resultados -->
<input type="text" id="pantalla" class="form-control mb-3 text-end" readonly>
<!--Contenedor de botones -->
<div class="row g-2">
<!--Todos los botones-->
<button class="btn btn-light col-3" onclick="agregar('7')">7</button>
<button class="btn btn-light col-3" onclick="agregar('8')">8</button>
<button class="btn btn-light col-3" onclick="agregar('9')">9</button>
<button class="btn btn-warning col-3" onclick="agregar('/')">÷</button>

<button class="btn btn-light col-3" onclick="agregar('4')">4</button>
<button class="btn btn-light col-3" onclick="agregar('5')">5</button>
<button class="btn btn-light col-3" onclick="agregar('6')">6</button>
<button class="btn btn-warning col-3" onclick="agregar('*')">×</button>

<button class="btn btn-light col-3" onclick="agregar('1')">1</button>
<button class="btn btn-light col-3" onclick="agregar('2')">2</button>
<button class="btn btn-light col-3" onclick="agregar('3')">3</button>
<button class="btn btn-warning col-3" onclick="agregar('-')">−</button>

<button class="btn btn-light col-3" onclick="agregar('0')">0</button>
<button class="btn btn-danger col-3" onclick="limpiar()">C</button>
<button class="btn btn-success col-3" onclick="calcular()">=</button>
<button class="btn btn-warning col-3" onclick="agregar('+')">+</button>

</div>
</div>
</div>
<!-- Conexión archivo js -->
<script src="script.js"></script>

</body>
</html>
